<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahlstrom Itsec</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #f7f5f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 480px;
      animation: fadein 1.4s ease both;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .site-name {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 3.5rem;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: 300;
      font-style: italic;
      color: #555;
      margin-bottom: 3rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #bbb;
      margin: 0 auto 2.5rem;
    }

    .greeting {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
    }

    .name {
      font-size: 1.35rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.03em;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <p class="site-name">Ahlstrom Itsec</p>
    <h1>Kære gæst</h1>
    <p class="subtitle">Lukket grundet andre opgaver.</p>
    <div class="divider"></div>
    <p class="greeting">Med venlig hilsen</p>
    <p class="name">Nenad Ahlstrøm Dragic</p>
  </main>

  <footer>© 2026 Nenad Ahlstrøm Dragic</footer>
</body>
</html>
